name: 🐛 Bug Report
description: Report a bug or unexpected behavior in esimorph
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "When I call mint() with a valid admin keypair, the transaction fails with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Deploy token contract to testnet
        2. Call initialize() with admin address
        3. Call mint() with amount 1000
        4. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and logs.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project is affected?
      options:
        - Smart Contract (Rust)
        - TypeScript SDK
        - CI / Build
        - Documentation
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant version info.
      placeholder: |
        - OS: Windows 11 / macOS 14 / Ubuntu 22.04
        - Rust: 1.77.0
        - Soroban CLI: 22.0.0
        - Node.js: 20.11.0
        - @stellar/stellar-sdk: 12.0.0
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or transaction hashes.
    validations:
      required: false
